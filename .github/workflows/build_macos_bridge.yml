name: Build macOS with Slicer Linux runtime

on:
  workflow_call:
  workflow_dispatch:

jobs:
  prepare_slicer_linux_runtime:
    name: Prepare Slicer Linux runtime
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'false'

      - name: Normalize script permissions
        shell: bash
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE" -type f \( -name "*.sh" -o -name "*.command" \) -exec chmod +x {} +
          chmod +x "$GITHUB_WORKSPACE/build_release_macos.sh"
          chmod +x "$GITHUB_WORKSPACE/build_linux.sh"


      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.3.0"
          useLocalCache: true
          useCloudCache: true

      - name: Apt-Install Dependencies
        uses: ./.github/actions/apt-install-deps

      - name: Build Linux deps
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Build Linux deps attempt $attempt"
            if ./build_linux.sh -drlL; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Transient dependency download/build failure, retrying after backoff"
              sleep $((attempt * 20))
            fi
          done
          exit 1

      - name: Configure Slicer Linux runtime host build
        shell: bash
        run: |
          cmake -S . -B build -G "Ninja Multi-Config" -DORCA_TOOLS=ON -DBBL_RELEASE_TO_PUBLIC=1 -DBBL_INTERNAL_TESTING=0

      - name: Build linux host runtime
        shell: bash
        run: |
          cmake --build build --config Release --target slicer_linux_runtime_host
          bash tools/slicer_linux_runtime_host/package_linux_host_runtime.sh build
          tar -czvf linux_host_runtime_${{ github.sha }}.tar.gz -C tools/slicer_linux_runtime_host/runtime linux-x86_64

      - name: Upload linux host runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux_host_runtime_macos_${{ github.sha }}
          path: ./linux_host_runtime_${{ github.sha }}.tar.gz
          if-no-files-found: error

  build_macos_arm64:
    name: Build macOS arm64
    runs-on: macos-14
    needs: prepare_slicer_linux_runtime
    env:
      ORCA_UPDATER_SIG_KEY: ${{ secrets.ORCA_UPDATER_SIG_KEY }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CERTIFICATE_ID }}
      APPLE_DEV_ACCOUNT: ${{ secrets.APPLE_DEV_ACCOUNT }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      APP_PWD: ${{ secrets.APP_PWD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'false'

      - name: Normalize script permissions
        shell: bash
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE" -type f \( -name "*.sh" -o -name "*.command" \) -exec chmod +x {} +
          chmod +x "$GITHUB_WORKSPACE/build_release_macos.sh"
          chmod +x "$GITHUB_WORKSPACE/build_linux.sh"


      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.3.0"
          useLocalCache: true
          useCloudCache: true

      - name: Download linux host runtime artifact
        uses: actions/download-artifact@v8
        with:
          name: linux_host_runtime_macos_${{ github.sha }}
          path: ${{ github.workspace }}/linux_host_runtime_artifact

      - name: Extract linux host runtime artifact on macOS arm64
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tools/slicer_linux_runtime_host/runtime"
          tar -xzf "$GITHUB_WORKSPACE/linux_host_runtime_artifact/linux_host_runtime_${{ github.sha }}.tar.gz" -C "$GITHUB_WORKSPACE/tools/slicer_linux_runtime_host/runtime"

      - name: Install mac tools
        shell: bash
        run: |
          brew install automake texinfo libtool nasm m4
          command -v nasm
          nasm -v
          m4_path="$(brew --prefix m4)/bin/m4"
          if [ ! -x "$m4_path" ]; then
            m4_path="$(brew --prefix m4)/bin/gm4"
          fi
          "$m4_path" --gnu --version
          echo "M4=$m4_path" >> "$GITHUB_ENV"
          echo "$(dirname "$m4_path")" >> "$GITHUB_PATH"
          brew list
          mkdir -p "$GITHUB_WORKSPACE/deps/build/arm64"

      - name: Import macOS signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' && env.KEYCHAIN_PASSWORD != '' && env.MACOS_CODESIGN_IDENTITY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/build_certificate.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security import "$certificate_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build macOS arm64 deps
        shell: bash
        run: |
          ./build_release_macos.sh -dx -1 -a arm64 -t 11.3

      - name: Build macOS arm64 app bundle
        shell: bash
        run: |
          ./build_release_macos.sh -s -n -x -1 -a arm64 -t 11.3

      - name: Create macOS arm64 DMG
        shell: bash
        run: |
          set -euo pipefail
          app="$GITHUB_WORKSPACE/build/arm64/OrcaSlicer/BambuStudio.app"
          codesign --verify --deep --strict --verbose=4 "$app"
          spctl --assess --type execute --verbose=4 "$app" || true
          mkdir -p "$GITHUB_WORKSPACE/build/arm64/BambuStudio_dmg"
          rm -rf "$GITHUB_WORKSPACE/build/arm64/BambuStudio_dmg"/*
          cp -R "$app" "$GITHUB_WORKSPACE/build/arm64/BambuStudio_dmg/"
          ln -sfn /Applications "$GITHUB_WORKSPACE/build/arm64/BambuStudio_dmg/Applications"
          ver=$(sed -nE 's/^[[:space:]]*set\(SLIC3R_VERSION[[:space:]]+"([^"]+)".*/\1/p' version.inc | head -n1)
          if [ -z "$ver" ]; then
            echo "ERROR: SLIC3R_VERSION could not be resolved from version.inc"
            exit 1
          fi
          dmg="$GITHUB_WORKSPACE/BambuStudio-OrcaSlicer_Mac_arm64_V${ver}.dmg"
          hdiutil create -volname "BambuStudio" -srcfolder "$GITHUB_WORKSPACE/build/arm64/BambuStudio_dmg" -ov -format UDZO "$dmg"
          if [ -n "${MACOS_CODESIGN_IDENTITY:-}" ] && [ -n "${APPLE_DEV_ACCOUNT:-}" ] && [ -n "${TEAM_ID:-}" ] && [ -n "${APP_PWD:-}" ]; then
            codesign --force --deep --verbose --options runtime --timestamp --entitlements "$GITHUB_WORKSPACE/scripts/disable_validation.entitlements" --sign "$MACOS_CODESIGN_IDENTITY" "$dmg"
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_DEV_ACCOUNT" --team-id "$TEAM_ID" --password "$APP_PWD" --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --verbose=4 "$dmg" || true
          else
            echo "No Apple Developer ID notarization secrets configured. Publishing ad-hoc signed macOS DMG."
            echo "Users may need Control-click -> Open or Privacy & Security -> Open Anyway on first launch."
          fi

      - name: Explain skipped hosted runtime validation
        shell: bash
        run: |
          echo "Hosted macOS runners do not support nested virtualization, so bundled Lima runtime validation is intentionally skipped here."

      - name: Upload macOS arm64 DMG
        uses: actions/upload-artifact@v7
        with:
          name: BambuStudio-OrcaSlicer_Mac_arm64_${{ github.sha }}
          path: ${{ github.workspace }}/BambuStudio-OrcaSlicer_Mac_arm64_V*.dmg
          if-no-files-found: error

  build_macos_x86_64:
    name: Build macOS x86_64
    runs-on: macos-14
    needs: prepare_slicer_linux_runtime
    env:
      ORCA_UPDATER_SIG_KEY: ${{ secrets.ORCA_UPDATER_SIG_KEY }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CERTIFICATE_ID }}
      APPLE_DEV_ACCOUNT: ${{ secrets.APPLE_DEV_ACCOUNT }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      APP_PWD: ${{ secrets.APP_PWD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: 'false'

      - name: Normalize script permissions
        shell: bash
        run: |
          set -euo pipefail
          find "$GITHUB_WORKSPACE" -type f \( -name "*.sh" -o -name "*.command" \) -exec chmod +x {} +
          chmod +x "$GITHUB_WORKSPACE/build_release_macos.sh"
          chmod +x "$GITHUB_WORKSPACE/build_linux.sh"


      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~4.3.0"
          useLocalCache: true
          useCloudCache: true

      - name: Download linux host runtime artifact
        uses: actions/download-artifact@v8
        with:
          name: linux_host_runtime_macos_${{ github.sha }}
          path: ${{ github.workspace }}/linux_host_runtime_artifact

      - name: Extract linux host runtime artifact on macOS x86_64
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tools/slicer_linux_runtime_host/runtime"
          tar -xzf "$GITHUB_WORKSPACE/linux_host_runtime_artifact/linux_host_runtime_${{ github.sha }}.tar.gz" -C "$GITHUB_WORKSPACE/tools/slicer_linux_runtime_host/runtime"

      - name: Install mac tools
        shell: bash
        run: |
          brew install automake texinfo libtool nasm m4
          command -v nasm
          nasm -v
          m4_path="$(brew --prefix m4)/bin/m4"
          if [ ! -x "$m4_path" ]; then
            m4_path="$(brew --prefix m4)/bin/gm4"
          fi
          "$m4_path" --gnu --version
          echo "M4=$m4_path" >> "$GITHUB_ENV"
          echo "$(dirname "$m4_path")" >> "$GITHUB_PATH"
          brew list
          mkdir -p "$GITHUB_WORKSPACE/deps/build/x86_64"

      - name: Import macOS signing certificate
        if: ${{ env.BUILD_CERTIFICATE_BASE64 != '' && env.P12_PASSWORD != '' && env.KEYCHAIN_PASSWORD != '' && env.MACOS_CODESIGN_IDENTITY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          certificate_path="$RUNNER_TEMP/build_certificate.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security import "$certificate_path" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychain -d user -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build macOS x86_64 deps
        shell: bash
        run: |
          ./build_release_macos.sh -dx -1 -a x86_64 -t 11.3

      - name: Build macOS x86_64 app bundle
        shell: bash
        run: |
          ./build_release_macos.sh -s -n -x -1 -a x86_64 -t 11.3

      - name: Create macOS x86_64 DMG
        shell: bash
        run: |
          set -euo pipefail
          app="$GITHUB_WORKSPACE/build/x86_64/OrcaSlicer/BambuStudio.app"
          codesign --verify --deep --strict --verbose=4 "$app"
          spctl --assess --type execute --verbose=4 "$app" || true
          mkdir -p "$GITHUB_WORKSPACE/build/x86_64/BambuStudio_dmg"
          rm -rf "$GITHUB_WORKSPACE/build/x86_64/BambuStudio_dmg"/*
          cp -R "$app" "$GITHUB_WORKSPACE/build/x86_64/BambuStudio_dmg/"
          ln -sfn /Applications "$GITHUB_WORKSPACE/build/x86_64/BambuStudio_dmg/Applications"
          ver=$(sed -nE 's/^[[:space:]]*set\(SLIC3R_VERSION[[:space:]]+"([^"]+)".*/\1/p' version.inc | head -n1)
          if [ -z "$ver" ]; then
            echo "ERROR: SLIC3R_VERSION could not be resolved from version.inc"
            exit 1
          fi
          dmg="$GITHUB_WORKSPACE/BambuStudio-OrcaSlicer_Mac_x86_64_V${ver}.dmg"
          hdiutil create -volname "BambuStudio" -srcfolder "$GITHUB_WORKSPACE/build/x86_64/BambuStudio_dmg" -ov -format UDZO "$dmg"
          if [ -n "${MACOS_CODESIGN_IDENTITY:-}" ] && [ -n "${APPLE_DEV_ACCOUNT:-}" ] && [ -n "${TEAM_ID:-}" ] && [ -n "${APP_PWD:-}" ]; then
            codesign --force --deep --verbose --options runtime --timestamp --entitlements "$GITHUB_WORKSPACE/scripts/disable_validation.entitlements" --sign "$MACOS_CODESIGN_IDENTITY" "$dmg"
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_DEV_ACCOUNT" --team-id "$TEAM_ID" --password "$APP_PWD" --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --verbose=4 "$dmg" || true
          else
